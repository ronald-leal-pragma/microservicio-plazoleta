server:
  port: 8081

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/plazoleta_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: admin
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 10

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect

jwt:
  secret: cGxhemFsZXRhU2VjcmV0S2V5UGFyYUpXVEF1dGhlbnRpY2F0aW9uMjAyNg==

usuarios:
  service:
    url: http://localhost:8082

twilio:
  account-sid: ${TWILIO_ACCOUNT_SID:AC_default_sid}
  auth-token: ${TWILIO_AUTH_TOKEN:default_token}
  phone-number: ${TWILIO_PHONE_NUMBER:+123456789}

appdescription: API del microservicio Plazoleta - gestión de restaurantes y platos
appversion: 1.0.0
